# Reverse proxy in front of open-ai-video-chat.
#
# - terminates TLS (provide certs at /etc/nginx/certs/{fullchain.pem,privkey.pem})
# - upgrades /ws/* to WebSocket
# - forwards /api/* to the FastAPI server, everything else to the Next.js app
# - injects X-Forwarded-For so the server's rate limiter sees the real client IP
# - leaves CORS + auth + security headers to the upstream (already set there)
#
# Usage with docker-compose.prod.yml: this file is mounted to
# /etc/nginx/conf.d/default.conf.

# When running behind a CDN (Cloudflare etc.), set CF-Connecting-IP via map.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream oavc_server { server server:8000; }
upstream oavc_web    { server web:3000;    }

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 64M;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;

    # API
    location /api/ {
        proxy_pass http://oavc_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket transcript stream
    location /ws/ {
        proxy_pass http://oavc_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # WS may idle while the user is silent
    }

    # Frontend
    location / {
        proxy_pass http://oavc_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
