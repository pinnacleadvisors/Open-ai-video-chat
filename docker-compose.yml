services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file: .env
    environment:
      - LLM_BASE_URL=http://ollama:11434
    volumes:
      - ./models:/app/models
      - ./media:/app/media
      - ./third_party:/app/third_party
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      - NEXT_PUBLIC_API_URL=http://server:8000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  ollama:
