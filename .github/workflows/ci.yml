name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            fastapi==0.115.4 \
            pydantic==2.9.2 \
            pydantic-settings==2.6.1 \
            python-multipart==0.0.12 \
            loguru==0.7.2 \
            numpy==1.26.4 \
            scipy==1.13.1 \
            httpx==0.27.2 \
            prometheus-client==0.21.0 \
            aiortc==1.14.0 \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            ruff==0.7.1 \
            mypy==1.13.0

      - name: ruff
        run: python -m ruff check server tests scripts

      - name: mypy
        run: python -m mypy --config-file pyproject.toml

      - name: pytest
        run: python -m pytest tests/ -q

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm install --no-audit --no-fund

      - name: typecheck
        run: npx tsc --noEmit

      - name: build
        run: npm run build
